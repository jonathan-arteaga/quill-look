name: QuillLook
options:
  bundleIdPrefix: com.jonathanarteaga
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    ENABLE_DEBUG_DYLIB: NO
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
targets:
  QuillLookCore:
    type: framework
    platform: macOS
    sources:
      - path: QuillLookCore/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonathanarteaga.QuillLookCore
        GENERATE_INFOPLIST_FILE: YES

  QuillLookPreviewExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: QuillLookPreviewExtension/Sources
      - path: QuillLookPreviewExtension/Resources
    dependencies:
      - target: QuillLookCore
      - sdk: Quartz.framework
      - sdk: UniformTypeIdentifiers.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonathanarteaga.QuillLook.PreviewExtension
        INFOPLIST_FILE: QuillLookPreviewExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuillLookPreviewExtension/QuillLookPreviewExtension.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES

  QuillLook:
    type: application
    platform: macOS
    sources:
      - path: QuillLook/App
      - path: QuillLook/Views
      - path: QuillLook/Resources
    dependencies:
      - target: QuillLookCore
      - target: QuillLookPreviewExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonathanarteaga.QuillLook
        INFOPLIST_FILE: QuillLook/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuillLook/QuillLook.entitlements
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"

  QuillLookTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: QuillLookTests
    dependencies:
      - target: QuillLookCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonathanarteaga.QuillLookTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  QuillLook:
    build:
      targets:
        QuillLook: all
        QuillLookTests: [test]
    test:
      targets:
        - QuillLookTests
      gatherCoverageData: false
